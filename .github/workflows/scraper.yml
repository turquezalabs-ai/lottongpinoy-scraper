name: Real-Time Scraper

on:
  schedule:
    - cron: '10 6 * * *'
    - cron: '10 9 * * *'
    - cron: '10 13 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # STEP 1: Install Chrome via Official Action (Fast & Reliable)
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 libcairo2 libatspi2.0-0 libxshmfence1
          # Skip Puppeteer download since we use system Chrome
          PUPPETEER_SKIP_DOWNLOAD=true npm install

      - name: Run Scraper
        run: node scrape.js

      - name: Upload to Live Site
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./data/
          server-dir: /public_html/
          protocol: ftps  # <--- CRITICAL FIX: Forces secure connection
          security: strict
