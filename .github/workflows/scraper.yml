name: Real-Time Scraper

on:
  schedule:
  - cron: '50 5 * * *'   # 1:50 PM PHT (05:50 UTC)
  - cron: '10 6 * * *'   # 2:10 PM PHT (06:10 UTC)
  - cron: '30 6 * * *'   # 2:30 PM PHT (06:30 UTC)
  - cron: '50 8 * * *'   # 4:50 PM PHT (08:50 UTC)
  - cron: '10 9 * * *'   # 5:10 PM PHT (09:10 UTC)
  - cron: '30 9 * * *'   # 5:30 PM PHT (09:30 UTC)
  - cron: '50 12 * * *'  # 8:50 PM PHT (12:50 UTC)
  - cron: '10 13 * * *'  # 9:10 PM PHT (13:10 UTC)
  - cron: '30 13 * * *'  # 9:30 PM PHT (13:30 UTC)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 libcairo2 libatspi2.0-0 libxshmfence1
          PUPPETEER_SKIP_DOWNLOAD=true npm install

      - name: Run Scraper
        run: node scrape.js

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # --- NUCLEAR OPTION (Guaranteed Fix) ---
          
          # 1. Save the new results file to a temporary backup
          cp data/results.json results_backup.json
          
          # 2. Force the local repo to match GitHub exactly (discards npm mess)
          git fetch origin main
          git reset --hard origin/main
          
          # 3. Restore our new results file
          mv results_backup.json data/results.json
          
          # 4. Add, Commit, and Push
          git add data/results.json
          git commit -m "Update results.json" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Live Site
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./data/
          server-dir: domains/lottong-pinoy.com/public_html/
          protocol: ftps  # <--- CRITICAL: Required for Hostinger
          security: loose # <--- CRITICAL: Bypasses certificate checks
