name: Real-Time Scraper

on:
  schedule:
    - cron: '10 6 * * *'
    - cron: '10 9 * * *'
    - cron: '10 13 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Chrome & Dependencies
        run: |
          sudo apt-get update
          # Install Chrome directly from apt (Fast & Reliable)
          sudo apt-get install -y chromium-browser
          # Install other libs
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 libcairo2 libatspi2.0-0 libxshmfence1

      - name: Install NPM Packages (Skip Download)
        run: PUPPETEER_SKIP_DOWNLOAD=true npm install

      - name: Run Scraper
        run: node scrape.js

      - name: Upload to Live Site
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./data/
          server-dir: /public_html/
