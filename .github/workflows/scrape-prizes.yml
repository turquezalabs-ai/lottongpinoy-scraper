name: Live Prize Scraper

on:
  schedule:
    - cron: '40 0 * * *'  # 8:40 AM Manila
    - cron: '40 3 * * *'  # 11:40 AM Manila
    - cron: '40 7 * * *'  # 3:40 PM Manila
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 libcairo2 libatspi2.0-0 libxshmfence1
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth jsdom

      - name: Run Prize Scraper
        run: node scrape_prizes.js

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # --- NUCLEAR OPTION (Git Conflict Fix) ---
          mkdir -p data
          cp data/prizes.json prizes_backup.json || touch prizes_backup.json
          git fetch origin main
          git reset --hard origin/main
          mv prizes_backup.json data/prizes.json
          
          git add data/prizes.json
          git commit -m "Update live prizes [$(date)]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Live Site
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./data/
          server-dir: domains/lottong-pinoy.com/public_html/
          protocol: ftps
          security: loose
