name: Partial Winners Scraper

on:
  schedule:
    - cron: '30 13 * * *' # 9:30 PM Manila (UTC+8)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 libcairo2 libatspi2.0-0 libxshmfence1
          PUPPETEER_SKIP_DOWNLOAD=true npm install

      - name: Run Partial Winners Scraper
        run: node scrape_partial_winners.js

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # --- NUCLEAR OPTION (Prevents Git Conflicts) ---
          
          # 1. Save the new file
          cp data/partial_winners.json partial_backup.json
          
          # 2. Force reset to match remote (cleans npm mess)
          git fetch origin main
          git reset --hard origin/main
          
          # 3. Restore our new file
          mv partial_backup.json data/partial_winners.json
          
          # 4. Commit and Push
          git add data/partial_winners.json
          git commit -m "Update partial winners" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Live Site
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./data/
          server-dir: domains/lottong-pinoy.com/public_html/
          protocol: ftps
          security: loose
