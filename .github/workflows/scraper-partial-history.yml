name: Partial Winners History

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # OPTIMIZED: Install Chrome & Dependencies in one go
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Node Dependencies
        run: npm install

      # This ensures Puppeteer uses the Chrome we just installed
      - name: Run History Scraper
        run: node scrape_partial_winners_history.js
        env:
          PUPPETEER_EXECUTABLE_PATH: $(which chrome)

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # NUCLEAR OPTION (Prevents Git Conflicts)
          if [ -f data/partial_winners_history.json ]; then
            cp data/partial_winners_history.json history_backup.json
          fi
          
          git fetch origin main
          git reset --hard origin/main
          
          if [ -f history_backup.json ]; then
            mv history_backup.json data/partial_winners_history.json
          fi
          
          git add data/partial_winners_history.json
          git commit -m "Update partial winners history" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Live Site
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./data/
          server-dir: domains/lottong-pinoy.com/public_html/
          protocol: ftps
          security: loose
