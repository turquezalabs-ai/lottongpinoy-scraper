name: Partial Winners History

on:
  workflow_dispatch: # Runs only when you click "Run workflow"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # FIX: Changed libasound2 to libasound2t64 for Ubuntu 24.04 (Noble)
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 libcairo2 libatspi2.0-0 libxshmfence1
          
          # Install Node modules
          npm install
          
          # DOWNLOAD CHROME specifically for Puppeteer
          npx puppeteer browsers install chrome

      - name: Run History Scraper
        run: node scrape_partial_winners_history.js

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # --- NUCLEAR OPTION (Prevents Git Conflicts) ---
          cp data/partial_winners_history.json history_backup.json
          git fetch origin main
          git reset --hard origin/main
          mv history_backup.json data/partial_winners_history.json
          
          git add data/partial_winners_history.json
          git commit -m "Update partial winners history" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Live Site
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./data/
          server-dir: domains/lottong-pinoy.com/public_html/
          protocol: ftps
          security: loose
