name: Partial Winners History

on:
  workflow_dispatch: # Runs only when you click "Run workflow"
  schedule:
    - cron: '30 13 * * *' # Runs at 9:30 PM Manila Time

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Dependencies
        run: npm install

      - name: Run Partial Winners Scraper
        run: node scrape_partial_winners.js

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # --- NUCLEAR OPTION (Prevents Git Conflicts) ---
          if [ -f data/partial_winners.json ]; then
            cp data/partial_winners.json backup.json
          fi
          
          git fetch origin main
          git reset --hard origin/main
          
          if [ -f backup.json ]; then
            mkdir -p data
            mv backup.json data/partial_winners.json
          fi
          
          git add data/partial_winners.json
          git commit -m "Update partial winners history" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Live Site
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./data/
          server-dir: domains/lottong-pinoy.com/public_html/
          protocol: ftps
          security: loose
