name: Lotto Marketing Prize Scraper

on:
  schedule:
    - cron: '15 14 * * *'
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        # THIS ENV VAR PREVENTS THE 7-MINUTE HANG
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth jsdom

      - name: Run Scraper
        # POINT TO THE CHROME WE JUST INSTALLED
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: node scrape_prize.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prizes.json
          git commit -m "📢 Marketing: Fresh Jackpot Update" || exit 0
          git push
