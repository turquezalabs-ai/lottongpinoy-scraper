name: Lotto Marketing Prize Scraper

on:
  schedule:
    - cron: '15 14 * * *'
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # If it takes more than 5 mins, something is wrong
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Essentials Only
        # We skip the heavy Chrome install and use the one already on the Ubuntu runner
        run: |
          npm install puppeteer-extra puppeteer-extra-plugin-stealth jsdom --no-audit --no-fund

      - name: Run Scraper
        # We tell Puppeteer to use the built-in Chrome to save 5+ minutes of download time
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: node scrape_prize.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prizes.json
          git commit -m "📢 Marketing: Fresh Jackpot Update" || exit 0
          git push
