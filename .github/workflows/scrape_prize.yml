name: Lotto Marketing Prize Scraper

on:
  schedule:
    # Runs at 14:15 UTC (10:15 PM Philippine Time) every day
    - cron: '15 14 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    
    # Give the action permission to write back to the repository
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        # We only need jsdom to parse the HTML
        run: npm install jsdom

      - name: Run Scraper
        run: node scrape_prize.js

      - name: Commit and Push Updated Prizes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prizes.json
          # The "|| exit 0" prevents the action from failing if the prize didn't change
          git commit -m "📢 Marketing: Updated Jackpot Prizes [automated]" || exit 0
          git push
